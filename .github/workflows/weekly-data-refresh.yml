name: Weekly Data Refresh

on:
  schedule:
    # Monday 03:00 JST (Sunday 18:00 UTC)
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify DATABASE_URL secret
        run: test -n "$DATABASE_URL"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape and upsert DB
        run: npm run scrape --workspace @sakamichi48/scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build static snapshot
        run: npm run data:snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Validate static snapshot
        run: npm run data:check

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/weekly-data-refresh
          delete-branch: true
          commit-message: "chore(data): weekly snapshot refresh"
          title: "chore(data): weekly snapshot refresh"
          body: |
            Weekly data refresh generated by GitHub Actions.

            - Scraped latest source pages
            - Upserted PostgreSQL
            - Rebuilt static snapshot in `packages/web/public/data`
            - Ran snapshot validation checks
          add-paths: |
            packages/web/public/data/*.json
